app:
  name: pfGoPlus
  env: local

server:
  host: 0.0.0.0
  port: 8080
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 30s

database:
  driver: sqlite
  dsn: ./tmp/pfgo-plus.db
  auto_migrate: true

logger:
  level: info
  format: json

auth:
  jwt_secret: change-me-in-production
  jwt_issuer: pfGoPlus
  access_token_ttl: 2h
  demo_username: admin
  demo_password: admin123
