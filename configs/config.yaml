app:
  name: pfGoPlus
  env: local

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 30s

grpc:
  host: 0.0.0.0
  port: 9090
  client_target: 127.0.0.1:9090

database:
  driver: sqlite
  dsn: ./tmp/pfgo-plus.db
  auto_migrate: true

logger:
  level: info
  format: json

auth:
  jwt_secret: change-me-in-production
  jwt_issuer: pfGoPlus
  access_token_ttl: 2h
  demo_username: admin
  demo_password: admin123

observability:
  enabled: true
  exporter: stdout
  metrics_path: /metrics
  otlp_endpoint: 127.0.0.1:4317
  otlp_insecure: true
  service_version: v0.3.0

todo_backend:
  mode: local
