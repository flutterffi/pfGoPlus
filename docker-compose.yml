services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENTRYPOINT: ./cmd/server
        BIN_NAME: pfgo-http
    environment:
      PFGO_APP_ENV: docker
      PFGO_DATABASE_DSN: /app/tmp/pfgo-http.db
      PFGO_TODO_BACKEND_MODE: grpc
      PFGO_GRPC_CLIENT_TARGET: grpcserver:9090
      PFGO_OBSERVABILITY_EXPORTER: otlp
      PFGO_OBSERVABILITY_OTLP_ENDPOINT: otel-collector:4317
      PFGO_OBSERVABILITY_OTLP_INSECURE: "true"
      PFGO_OBSERVABILITY_SERVICE_VERSION: v1.2.0
    ports:
      - "8080:8080"
    depends_on:
      - grpcserver
      - otel-collector

  grpcserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ENTRYPOINT: ./cmd/grpcserver
        BIN_NAME: pfgo-grpc
    environment:
      PFGO_APP_ENV: docker
      PFGO_DATABASE_DSN: /app/tmp/pfgo-grpc.db
      PFGO_OBSERVABILITY_EXPORTER: otlp
      PFGO_OBSERVABILITY_OTLP_ENDPOINT: otel-collector:4317
      PFGO_OBSERVABILITY_OTLP_INSECURE: "true"
      PFGO_OBSERVABILITY_SERVICE_VERSION: v1.2.0
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    volumes:
      - ./deployments/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "9464:9464"

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9091:9090"
    depends_on:
      - otel-collector
